  <!-- Adobe Target: pre-hiding snippet (prevents content flicker). Must load before at.js. -->
  <script>
    ;(function (win, doc, style, timeout) {
      var STYLE_ID = 'at-body-style';
      function getParent() { return doc.getElementsByTagName('head')[0]; }
      function addStyle(parent, id, def) {
        if (!parent) { return; }
        var s = doc.createElement('style');
        s.id = id; s.innerHTML = def; parent.appendChild(s);
      }
      function removeStyle(parent, id) {
        if (!parent) { return; }
        var s = doc.getElementById(id);
        if (!s) { return; }
        parent.removeChild(s);
      }
      addStyle(getParent(), STYLE_ID, style);
      setTimeout(function () { removeStyle(getParent(), STYLE_ID); }, timeout);
    }(window, document, 'body {opacity: 0 !important}', 3000));
  </script>

  <!-- Adobe Target: settings (Target-only, no Analytics). Must load before at.js. -->

  <main class="container">
    <h1>Image Slider</h1>
    <p>An auto-playing carousel with previous/next controls and clickable dots.</p>

    <div class="slider">
      <div class="slides">
        <img src="https://picsum.photos/id/1015/800/420" alt="Slide 1">

      <button class="slider-btn prev" aria-label="Previous slide">&#10094;</button>
      <button class="slider-btn next" aria-label="Next slide">&#10095;</button>
    </div>
    <div class="dots"></div>
